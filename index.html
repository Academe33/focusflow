<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>FocusFlow</title>
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#2d7dd2;display:flex;flex-direction:column;touch-action:manipulation}

/* ===== TOPBAR ===== */
.topbar{background:#2d7dd2;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.12);min-height:52px}
.logo{font-size:16px;font-weight:800;color:#fff;white-space:nowrap}
.tabs{display:flex;gap:3px;background:rgba(0,0,0,0.18);border-radius:10px;padding:3px;margin-left:6px}
.tab{background:transparent;color:rgba(255,255,255,0.7);border:none;padding:7px 13px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;min-height:36px;min-width:44px}
.tab.active{background:rgba(255,255,255,0.22);color:#fff}
.ml{margin-left:auto}
.btn-new{background:rgba(255,255,255,0.2);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;min-height:36px;min-width:44px;white-space:nowrap}
.btn-new:active{background:rgba(255,255,255,0.35)}

/* ===== KANBAN BOARD ===== */
#viewKanban{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.board{flex:1;display:flex;gap:10px;padding:10px 10px 16px;overflow-x:auto;overflow-y:hidden;align-items:flex-start;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.col{background:#f1f2f4;border-radius:14px;width:82vw;max-width:300px;min-width:240px;flex-shrink:0;display:flex;flex-direction:column;max-height:calc(100dvh - 80px);scroll-snap-align:start}
@media(min-width:700px){
  .col{width:290px;max-width:290px}
  .board{scroll-snap-type:none}
}
.col-hd{padding:12px 14px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.col-title{font-weight:700;font-size:14px;color:#172b4d}
.col-cnt{background:#e2e4e9;border-radius:20px;padding:1px 8px;font-size:12px;color:#626f86}
.cards{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 8px;display:flex;flex-direction:column;gap:8px;min-height:48px}

/* ===== CARD ===== */
.card{background:#fff;border-radius:10px;padding:12px 12px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.08);user-select:none;-webkit-user-select:none;position:relative;transition:box-shadow .15s}
.card:active{box-shadow:0 4px 14px rgba(0,0,0,.18);transform:scale(0.99)}
.card-bar{height:4px;border-radius:2px;margin-bottom:9px}
.card-title{font-size:13px;font-weight:600;color:#172b4d;line-height:1.4;margin-bottom:5px;padding-right:32px}
.card-desc{font-size:12px;color:#626f86;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.card-due{font-size:11px;color:#94a3b8}
.card-due.ov{color:#ef4444}
/* Botão delete: grande o suficiente para toque (44x44px) */
.card-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.04);border:none;cursor:pointer;color:#adb5bd;font-size:14px;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.card-del:active{background:#fee2e2;color:#ef4444}

/* Botões de mover coluna (mobile-first) */
.card-move{display:flex;gap:4px;margin-top:8px}
.move-btn{background:#f1f2f4;border:none;border-radius:6px;padding:4px 8px;font-size:11px;color:#626f86;cursor:pointer;flex:1;min-height:30px}
.move-btn:active{background:#dbeafe;color:#2d7dd2}

.add-card{background:none;border:none;cursor:pointer;padding:12px 14px;text-align:left;color:#626f86;font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;flex-shrink:0;min-height:44px;width:100%}
.add-card:active{color:#172b4d}

/* ===== FOCO VIEW ===== */
#viewFoco{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 14px 60px;background:#0f172a}
.foco-inner{max-width:560px;margin:0 auto}
.foco-title{text-align:center;margin-bottom:22px}
.foco-title h2{font-size:20px;font-weight:800;color:#f8fafc}
.foco-title p{font-size:13px;color:#475569;margin-top:5px}
.foco-card{border-radius:14px;padding:16px 18px;margin-bottom:12px}
.fc-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.fc-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.fc-sub{font-size:11px;color:#475569;margin-top:2px}
.fc-actions{margin-left:auto;display:flex;gap:6px;align-items:center;flex-shrink:0}
/* Botões de foco com área de toque adequada */
.fc-check{border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:1.5px solid;flex-shrink:0;background:transparent}
.fc-edit{background:rgba(255,255,255,0.08);border:none;cursor:pointer;color:#94a3b8;font-size:16px;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.fc-edit:active{background:rgba(255,255,255,0.18)}
.fc-text{font-size:13px;font-weight:500;color:#cbd5e1;line-height:1.6}
.fc-text.dia{font-size:16px;font-weight:700;color:#f1f5f9}
.fc-text.done{color:#334155;text-decoration:line-through}
.fc-empty{background:none;border:1px dashed;border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;width:100%;text-align:left;color:#475569;min-height:44px}
.fc-arrow{text-align:center;margin-top:10px;font-size:11px;color:#1e3a5f;letter-spacing:1px}

/* ===== MODAL OVERLAY ===== */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center;padding:0}
.overlay.open{display:flex}
/* Sheet bottom para mobile, centered para desktop */
.modal{background:#fff;border-radius:20px 20px 0 0;padding:22px 20px 32px;width:100%;max-width:520px;box-shadow:0 -4px 32px rgba(0,0,0,.25);max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:600px){
  .overlay{align-items:center;padding:16px}
  .modal{border-radius:18px;padding:26px 24px}
}
.modal-handle{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 18px}
.modal.dark{background:#1e293b;border:1px solid #334155}
.modal h3{font-size:17px;font-weight:700;margin-bottom:18px;color:#172b4d}
.modal.dark h3{color:#f8fafc}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;color:#626f86;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.modal.dark .fg label{color:#64748b}
/* CRÍTICO: font-size 16px evita zoom automático no iOS Safari */
.fi{width:100%;background:#f7f8f9;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;color:#172b4d;font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none}
.modal.dark .fi{background:#0f172a;border-color:#334155;color:#e2e8f0}
.fi:focus{border-color:#3b82f6;background:#fff}
.modal.dark .fi:focus{background:#0f172a}
textarea.fi{min-height:80px;resize:vertical}
.row2{display:flex;gap:10px}
.row2>div{flex:1}
.mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-cancel{background:#f1f2f4;color:#626f86;border:none;padding:12px 18px;border-radius:10px;cursor:pointer;font-size:15px;min-height:48px;min-width:80px}
.modal.dark .btn-cancel{background:rgba(255,255,255,0.06);color:#64748b;border:1px solid #334155}
.btn-save{color:#fff;border:none;padding:12px 22px;border-radius:10px;cursor:pointer;font-size:15px;font-weight:700;background:#2d7dd2;min-height:48px;min-width:90px}
.btn-save:active{opacity:.85}

/* ===== MODAL DE CONFIRMAÇÃO CUSTOMIZADO (substitui confirm()) ===== */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;align-items:flex-end;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:400px;text-align:center}
@media(min-width:500px){
  .confirm-overlay{align-items:center;padding:16px}
  .confirm-box{border-radius:18px;padding:28px 24px}
}
.confirm-icon{font-size:36px;margin-bottom:12px}
.confirm-msg{font-size:16px;font-weight:600;color:#172b4d;margin-bottom:6px}
.confirm-sub{font-size:13px;color:#64748b;margin-bottom:22px}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;min-height:48px}
.confirm-no{background:#f1f2f4;color:#626f86}
.confirm-yes{background:#ef4444;color:#fff}
.confirm-yes:active{opacity:.85}

/* ===== SPINNER ===== */
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== EMPTY STATE ===== */
.empty-col{text-align:center;padding:24px 12px;font-size:12px;color:#94a3b8;line-height:1.6}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="logo">⚡ FocusFlow</span>
  <div class="tabs">
    <button class="tab active" id="tabK" onclick="showView('kanban')">📋 Kanban</button>
    <button class="tab" id="tabF" onclick="showView('foco')">🎯 Foco</button>
  </div>
  <div class="ml">
    <button class="btn-new" id="btnNew" onclick="openNewTask()">+ Tarefa</button>
  </div>
</div>

<!-- KANBAN -->
<div id="viewKanban">
  <div class="board" id="board">
    <div style="flex:1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.8);font-size:15px;gap:10px">
      <span class="spinner"></span> Carregando...
    </div>
  </div>
</div>

<!-- FOCO -->
<div id="viewFoco">
  <div class="foco-inner">
    <div class="foco-title">
      <h2>O que importa agora?</h2>
      <p>Cada ação de hoje constrói o seu ano</p>
    </div>
    <div id="focoCards">
      <div style="text-align:center;color:#475569;padding:40px"><span class="spinner"></span></div>
    </div>
  </div>
</div>

<!-- MODAL: Nova/Editar Tarefa -->
<div class="overlay" id="overlayTask" onclick="handleOverlayClick(event,'overlayTask')">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-handle"></div>
    <h3 id="modalTitle">Nova Tarefa</h3>
    <div class="fg">
      <label for="fTitle">Título *</label>
      <input class="fi" id="fTitle" type="text" placeholder="O que precisa ser feito?" autocomplete="off"/>
    </div>
    <div class="fg">
      <label for="fDesc">Descrição</label>
      <textarea class="fi" id="fDesc" placeholder="Detalhes..."></textarea>
    </div>
    <div class="row2">
      <div class="fg">
        <label for="fPri">Prioridade</label>
        <select class="fi" id="fPri">
          <option value="high">🔴 Alta</option>
          <option value="medium" selected>🟡 Média</option>
          <option value="low">🟣 Baixa</option>
        </select>
      </div>
      <div class="fg">
        <label for="fStatus">Status</label>
        <select class="fi" id="fStatus">
          <option value="pending">A Fazer</option>
          <option value="in_progress">Em Andamento</option>
          <option value="done">Concluído</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <label for="fDue">Prazo</label>
      <input class="fi" id="fDue" type="date"/>
    </div>
    <div class="mfoot">
      <button class="btn-cancel" onclick="closeTask()">Cancelar</button>
      <button class="btn-save" onclick="saveTask()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: Foco/Objetivo -->
<div class="overlay" id="overlayFoco" onclick="handleOverlayClick(event,'overlayFoco')">
  <div class="modal dark" role="dialog" aria-modal="true">
    <div class="modal-handle" style="background:rgba(255,255,255,0.15)"></div>
    <h3 id="focoTitle">Objetivo</h3>
    <div class="fg">
      <label for="foLabel">Período</label>
      <input class="fi" id="foLabel" type="text" placeholder="Ex: Abril 2026" autocomplete="off"/>
    </div>
    <div class="fg">
      <label for="foTexto">Objetivo</label>
      <textarea class="fi" id="foTexto" rows="4" placeholder="Descreva o objetivo..."></textarea>
    </div>
    <div class="mfoot">
      <button class="btn-cancel" onclick="closeFoco()">Cancelar</button>
      <button class="btn-save" id="foSaveBtn" onclick="saveFoco()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirmação customizada (substitui confirm() nativo) -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">🗑️</div>
    <div class="confirm-msg">Excluir tarefa?</div>
    <div class="confirm-sub">Essa ação não pode ser desfeita.</div>
    <div class="confirm-btns">
      <button class="confirm-no" onclick="confirmResolve(false)">Cancelar</button>
      <button class="confirm-yes" onclick="confirmResolve(true)">Excluir</button>
    </div>
  </div>
</div>

<script>
/* ============ CONFIG ============ */
var T = 'https://nina-cd7d5ae9.base44.app/functions/tasks';
var O = 'https://nina-cd7d5ae9.base44.app/functions/objetivos';

/* ============ STATE ============ */
var tasks = [], objList = [], objetivos = {};
var editId = null, focoKey = null, focoExId = null;
var confirmCallback = null;

var PC = {high:'#ef4444', medium:'#f59e0b', low:'#a855f7'};
var MO = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var COL_DEFS = [
  {k:'pending',     l:'A Fazer'},
  {k:'in_progress', l:'Em Andamento'},
  {k:'done',        l:'Concluído'}
];
var NV = [
  {k:'ano',    l:'OBJETIVO DO ANO',     s:'A grande missão',                        i:'🏆',c:'#f59e0b',bg:'rgba(245,158,11,.08)',bd:'rgba(245,158,11,.3)'},
  {k:'mes',    l:'OBJETIVO DO MÊS',     s:'O que precisa acontecer este mês',       i:'📅',c:'#3b82f6',bg:'rgba(59,130,246,.08)', bd:'rgba(59,130,246,.3)'},
  {k:'semana', l:'OBJETIVO DA SEMANA',  s:'A entrega mais importante desta semana', i:'🎯',c:'#8b5cf6',bg:'rgba(139,92,246,.08)',bd:'rgba(139,92,246,.3)'},
  {k:'dia',    l:'FOCO DO DIA',         s:'A única coisa que importa hoje',         i:'⚡',c:'#10b981',bg:'rgba(16,185,129,.10)', bd:'rgba(16,185,129,.4)'},
];

/* ============ API ============ */
function api(url, opts) {
  return fetch(url, opts).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}
function apiGet(u)      { return api(u); }
function apiPost(u, d)  { return api(u, {method:'POST',   headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)}); }
function apiPut(u, d)   { return api(u, {method:'PUT',    headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)}); }
function apiDel(u)      { return api(u, {method:'DELETE'}); }

/* ============ CONFIRMAÇÃO CUSTOM (sem confirm() nativo) ============ */
function showConfirm(msg, sub) {
  return new Promise(function(resolve) {
    confirmCallback = resolve;
    if (msg) document.querySelector('.confirm-msg').textContent = msg;
    if (sub) document.querySelector('.confirm-sub').textContent = sub;
    document.getElementById('confirmOverlay').classList.add('open');
  });
}
function confirmResolve(val) {
  document.getElementById('confirmOverlay').classList.remove('open');
  if (confirmCallback) { confirmCallback(val); confirmCallback = null; }
}

/* ============ OVERLAY CLICK (fecha ao clicar fora do modal) ============ */
function handleOverlayClick(e, id) {
  if (e.target.id === id) {
    if (id === 'overlayTask') closeTask();
    if (id === 'overlayFoco') closeFoco();
  }
}

/* ============ VIEWS ============ */
function showView(v) {
  document.getElementById('viewKanban').style.display = v === 'kanban' ? 'flex' : 'none';
  document.getElementById('viewFoco').style.display   = v === 'foco'   ? 'flex' : 'none';
  document.getElementById('tabK').className = 'tab' + (v === 'kanban' ? ' active' : '');
  document.getElementById('tabF').className = 'tab' + (v === 'foco'   ? ' active' : '');
  document.getElementById('btnNew').style.display = v === 'kanban' ? '' : 'none';
  if (v === 'foco') loadFoco();
}

/* ============ KANBAN ============ */
function loadTasks() {
  apiGet(T).then(function(d) {
    tasks = Array.isArray(d) ? d : [];
    renderBoard();
  }).catch(function(e) {
    document.getElementById('board').innerHTML =
      '<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#fca5a5;padding:20px;text-align:center">' +
      '<div style="font-size:32px">⚠️</div><div>Erro ao carregar<br><small>' + esc(e.message) + '</small></div>' +
      '<button onclick="loadTasks()" style="background:rgba(255,255,255,0.2);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px">Tentar novamente</button></div>';
  });
}

function renderBoard() {
  var cols = {pending:[], in_progress:[], done:[]};
  tasks.forEach(function(t) {
    var s = t.status || 'pending';
    if (cols[s]) cols[s].push(t);
  });

  document.getElementById('board').innerHTML = COL_DEFS.map(function(col) {
    var list = cols[col.k];
    return '<div class="col" id="col-' + col.k + '" data-status="' + col.k + '">' +
      '<div class="col-hd">' +
        '<span class="col-title">' + col.l + '</span>' +
        '<span class="col-cnt">' + list.length + '</span>' +
      '</div>' +
      '<div class="cards">' +
        (list.length === 0
          ? '<div class="empty-col">Nenhuma tarefa<br>aqui ainda</div>'
          : list.map(function(t) { return renderCard(t, col.k); }).join('')) +
      '</div>' +
      '<button class="add-card" onclick="openNewTask(\'' + col.k + '\')">＋ Adicionar cartão</button>' +
    '</div>';
  }).join('');
}

function renderCard(t, currentStatus) {
  var today = new Date().toISOString().split('T')[0];
  var ov = t.due_date && t.due_date < today && t.status !== 'done';
  var ds = '';
  if (t.due_date) {
    var dt = new Date(t.due_date + 'T00:00:00');
    ds = dt.getDate() + ' ' + MO[dt.getMonth()];
  }

  // Botões de mover coluna (mobile-friendly, substitui drag & drop)
  var moveHtml = '<div class="card-move">';
  if (currentStatus !== 'pending')     moveHtml += '<button class="move-btn" onclick="moveCard(event,\'' + t.id + '\',\'pending\')">◀ A Fazer</button>';
  if (currentStatus !== 'in_progress') moveHtml += '<button class="move-btn" onclick="moveCard(event,\'' + t.id + '\',\'in_progress\')">▶ Andamento</button>';
  if (currentStatus !== 'done')        moveHtml += '<button class="move-btn" onclick="moveCard(event,\'' + t.id + '\',\'done\')">✓ Concluído</button>';
  moveHtml += '</div>';

  return '<div class="card" onclick="openEdit(\'' + t.id + '\')">' +
    '<button class="card-del" onclick="doDelete(event,\'' + t.id + '\')">🗑</button>' +
    '<div class="card-bar" style="background:' + (PC[t.priority] || '#3b82f6') + '"></div>' +
    '<div class="card-title">' + esc(t.title) + '</div>' +
    (t.description ? '<div class="card-desc">' + esc(t.description) + '</div>' : '') +
    (ds ? '<div class="card-due' + (ov ? ' ov' : '') + '">📅 ' + ds + '</div>' : '') +
    moveHtml +
  '</div>';
}

function moveCard(e, id, newStatus) {
  e.stopPropagation();
  var t = tasks.find(function(x) { return x.id === id; });
  if (!t) return;
  var updated = Object.assign({}, t, {status: newStatus});
  apiPut(T + '/' + id, updated).then(loadTasks).catch(function(err) {
    alert('Erro ao mover: ' + err.message);
  });
}

/* ============ TASK MODAL ============ */
function openNewTask(status) {
  editId = null;
  document.getElementById('modalTitle').textContent = 'Nova Tarefa';
  document.getElementById('fTitle').value   = '';
  document.getElementById('fDesc').value    = '';
  document.getElementById('fPri').value     = 'medium';
  document.getElementById('fStatus').value  = status || 'pending';
  document.getElementById('fDue').value     = '';
  document.getElementById('overlayTask').classList.add('open');
  setTimeout(function() { document.getElementById('fTitle').focus(); }, 150);
}

function openEdit(id) {
  var t = tasks.find(function(x) { return x.id === id; });
  if (!t) return;
  editId = id;
  document.getElementById('modalTitle').textContent = 'Editar Tarefa';
  document.getElementById('fTitle').value   = t.title       || '';
  document.getElementById('fDesc').value    = t.description || '';
  document.getElementById('fPri').value     = t.priority    || 'medium';
  document.getElementById('fStatus').value  = t.status      || 'pending';
  document.getElementById('fDue').value     = t.due_date    || '';
  document.getElementById('overlayTask').classList.add('open');
}

function closeTask() {
  document.getElementById('overlayTask').classList.remove('open');
  editId = null;
}

function saveTask() {
  var title = document.getElementById('fTitle').value.trim();
  if (!title) {
    document.getElementById('fTitle').focus();
    document.getElementById('fTitle').style.borderColor = '#ef4444';
    setTimeout(function() { document.getElementById('fTitle').style.borderColor = ''; }, 2000);
    return;
  }
  var data = {
    title:       title,
    description: document.getElementById('fDesc').value.trim(),
    priority:    document.getElementById('fPri').value,
    status:      document.getElementById('fStatus').value,
    due_date:    document.getElementById('fDue').value || null
  };
  var p = editId ? apiPut(T + '/' + editId, data) : apiPost(T, data);
  p.then(function() { closeTask(); loadTasks(); })
   .catch(function(err) { alert('Erro ao salvar: ' + err.message); });
}

function doDelete(e, id) {
  e.stopPropagation();
  showConfirm('Excluir tarefa?', 'Essa ação não pode ser desfeita.').then(function(ok) {
    if (!ok) return;
    apiDel(T + '/' + id).then(loadTasks).catch(function(err) {
      alert('Erro ao excluir: ' + err.message);
    });
  });
}

/* ============ FOCO ============ */
function loadFoco() {
  apiGet(O).then(function(d) {
    objList = Array.isArray(d) ? d : [];
    var map = {};
    NV.forEach(function(n) {
      var f = objList
        .filter(function(o) { return o.nivel === n.k; })
        .sort(function(a, b) { return new Date(b.created_date) - new Date(a.created_date); });
      map[n.k] = f[0] || null;
    });
    objetivos = map;
    renderFoco();
  }).catch(function(e) {
    document.getElementById('focoCards').innerHTML =
      '<div style="text-align:center;color:#f87171;padding:20px">Erro ao carregar objetivos.<br><button onclick="loadFoco()" style="margin-top:12px;background:rgba(255,255,255,0.1);color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer">Tentar novamente</button></div>';
  });
}

function renderFoco() {
  var ww = ['100%', '92%', '84%', '76%'];
  document.getElementById('focoCards').innerHTML = NV.map(function(n, i) {
    var obj = objetivos[n.k], done = obj && obj.concluido;
    return '<div style="display:flex;justify-content:center">' +
      '<div class="foco-card" style="width:' + ww[i] + ';background:' + n.bg + ';border:1.5px solid ' + n.bd + '">' +
        '<div class="fc-head">' +
          '<span style="font-size:20px;flex-shrink:0">' + n.i + '</span>' +
          '<div style="flex:1;min-width:0">' +
            '<div class="fc-label" style="color:' + n.c + '">' + n.l + '</div>' +
            '<div class="fc-sub">' + (obj && obj.periodo_label ? esc(obj.periodo_label) : n.s) + '</div>' +
          '</div>' +
          '<div class="fc-actions">' +
            (obj
              ? '<button class="fc-check" style="border-color:' + n.c + ';background:' + (done ? n.c : 'transparent') + ';color:' + (done ? '#fff' : n.c) + '" onclick="toggleObj(\'' + n.k + '\')">' + (done ? '✓' : '') + '</button>'
              : '') +
            '<button class="fc-edit" onclick="openFocoEdit(\'' + n.k + '\')">✏️</button>' +
          '</div>' +
        '</div>' +
        (obj && obj.texto
          ? '<div class="fc-text' + (i === 3 ? ' dia' : '') + (done ? ' done' : '') + '">' + esc(obj.texto) + '</div>'
          : '<button class="fc-empty" style="border-color:' + n.bd + ';color:#64748b" onclick="openFocoEdit(\'' + n.k + '\')">＋ Definir ' + n.l.toLowerCase() + '...</button>') +
        (i < 3 ? '<div class="fc-arrow">↓ alimenta isso</div>' : '') +
      '</div></div>';
  }).join('');
}

function openFocoEdit(key) {
  var n   = NV.find(function(x) { return x.k === key; });
  var obj = objetivos[key];
  focoKey = key;
  focoExId = obj ? obj.id : null;
  document.getElementById('focoTitle').textContent   = n.l;
  document.getElementById('foLabel').value           = obj && obj.periodo_label ? obj.periodo_label : '';
  document.getElementById('foTexto').value           = obj && obj.texto         ? obj.texto         : '';
  document.getElementById('foSaveBtn').style.background = n.c;
  document.getElementById('overlayFoco').classList.add('open');
  setTimeout(function() { document.getElementById('foTexto').focus(); }, 150);
}

function closeFoco() {
  document.getElementById('overlayFoco').classList.remove('open');
}

function saveFoco() {
  var texto = document.getElementById('foTexto').value.trim();
  if (!texto) return;
  var data = {
    nivel:         focoKey,
    texto:         texto,
    periodo_label: document.getElementById('foLabel').value.trim(),
    concluido:     false
  };
  var p = focoExId ? apiPut(O + '/' + focoExId, data) : apiPost(O, data);
  p.then(function() { closeFoco(); loadFoco(); })
   .catch(function(err) { alert('Erro ao salvar: ' + err.message); });
}

function toggleObj(key) {
  var obj = objetivos[key];
  if (!obj) return;
  apiPut(O + '/' + obj.id, Object.assign({}, obj, {concluido: !obj.concluido})).then(loadFoco);
}

/* ============ UTILS ============ */
function esc(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

/* ============ KEYBOARD ============ */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeTask();
    closeFoco();
    confirmResolve(false);
  }
  if (e.key === 'Enter' && e.metaKey) saveTask();
});

/* ============ iOS KEYBOARD FIX ============ */
// Evita que o teclado iOS empurre o modal para fora da tela
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', function() {
    var vh = window.visualViewport.height;
    document.querySelectorAll('.overlay.open .modal').forEach(function(m) {
      m.style.maxHeight = (vh * 0.90) + 'px';
    });
  });
}

/* ============ INIT ============ */
loadTasks();
</script>
</body>
</html>
